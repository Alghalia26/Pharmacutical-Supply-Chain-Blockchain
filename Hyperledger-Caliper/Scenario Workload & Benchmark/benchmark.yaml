test:
  name: pharmachain-scenario-benchmark
  description: Scenario-based performance testing for pharmaceutical supply chain

  workers:
    number: 5

  rounds:

    # Scenario 1: End-to-End Traceability
    - label: S1-traceability-very-low
      description: Traceability scenario under very low load
      txNumber: 200
      rateControl:
        type: fixed-rate
        opts:
          tps: 5
      workload:
        module: workload/traceabilityScenario.js

    - label: S1-traceability-low
      description: Traceability scenario under low load
      txNumber: 400
      rateControl:
        type: fixed-rate
        opts:
          tps: 10
      workload:
        module: workload/traceabilityScenario.js

    - label: S1-traceability-medium
      description: Traceability scenario under medium load
      txNumber: 800
      rateControl:
        type: fixed-rate
        opts:
          tps: 20
      workload:
        module: workload/traceabilityScenario.js

    - label: S1-traceability-high
      description: Traceability scenario under high load
      txNumber: 1200
      rateControl:
        type: fixed-rate
        opts:
          tps: 30
      workload:
        module: workload/traceabilityScenario.js

    - label: S1-traceability-very-high
      description: Traceability scenario under very high load
      txNumber: 1600
      rateControl:
        type: fixed-rate
        opts:
          tps: 40
      workload:
        module: workload/traceabilityScenario.js

    - label: S1-traceability-extreme
      description: Traceability scenario under extreme load
      txNumber: 2000
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/traceabilityScenario.js


    # Scenario 2: Temperature Monitoring
    - label: S2-temperature-very-low
