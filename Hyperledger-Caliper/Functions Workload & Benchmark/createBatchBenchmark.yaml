test:
  name: createBatch-function-benchmark
  description: Function-level benchmark for createBatch

  workers:
    number: 5

  rounds:
    - label: createBatch-very-low
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 5
      workload:
        module: workload/createBatchWorkload.js

    - label: createBatch-low
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 10
      workload:
        module: workload/createBatchWorkload.js

    - label: createBatch-medium
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 20
      workload:
        module: workload/createBatchWorkload.js

    - label: createBatch-high
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 30
      workload:
        module: workload/createBatchWorkload.js

    - label: createBatch-very-high
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 40
      workload:
        module: workload/createBatchWorkload.js

    - label: createBatch-extreme
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/createBatchWorkload.js
