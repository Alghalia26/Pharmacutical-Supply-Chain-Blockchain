test:
  name: queryBatch-function-benchmark
  description: Function-level benchmark for queryBatch

  workers:
    number: 5

  rounds:
    - label: query-very-low
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts: { tps: 5 }
      workload:
        module: workload/queryBatchWorkload.js

    - label: query-low
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts: { tps: 10 }
      workload:
        module: workload/queryBatchWorkload.js

    - label: query-medium
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts: { tps: 20 }
      workload:
        module: workload/queryBatchWorkload.js

    - label: query-high
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts: { tps: 30 }
      workload:
        module: workload/queryBatchWorkload.js

    - label: query-very-high
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts: { tps: 40 }
      workload:
        module: workload/queryBatchWorkload.js

    - label: query-extreme
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts: { tps: 50 }
      workload:
        module: workload/queryBatchWorkload.js
