test:
  name: updateTemperature-function-benchmark
  description: Function-level benchmark for updateTemperature

  workers:
    number: 5

  rounds:
    - label: temp-very-low
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts: { tps: 5 }
      workload:
        module: workload/updateTemperatureWorkload.js

    - label: temp-low
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts: { tps: 10 }
      workload:
        module: workload/updateTemperatureWorkload.js

    - label: temp-medium
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts: { tps: 20 }
      workload:
        module: workload/updateTemperatureWorkload.js

    - label: temp-high
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts: { tps: 30 }
      workload:
        module: workload/updateTemperatureWorkload.js

    - label: temp-very-high
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts: { tps: 40 }
      workload:
        module: workload/updateTemperatureWorkload.js

    - label: temp-extreme
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts: { tps: 50 }
      workload:
        module: workload/updateTemperatureWorkload.js
