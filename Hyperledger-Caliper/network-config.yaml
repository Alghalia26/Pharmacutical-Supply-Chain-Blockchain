name: Pharma Fabric Network
version: "1.0"

caliper:
  blockchain: fabric

clients:
  client0:
    client:
      organization: ShippingOrg1
      credentialStore:
        path: /tmp/hfc-kvs/shipping
        cryptoStore:
          path: /tmp/hfc-cvs/shipping
      clientPrivateKey:
        path: ../artifacts/channel/crypto-config/peerOrganizations/shipping.example.com/users/Admin@shipping.example.com/msp/keystore/priv_sk
      clientSignedCert:
        path: ../artifacts/channel/crypto-config/peerOrganizations/shipping.example.com/users/Admin@shipping.example.com/msp/signcerts/Admin@shipping.example.com-cert.pem
  clientDistributor:
    client:
      organization: DistributorOrg2
      credentialStore:
        path: /tmp/hfc-kvs/distributor
        cryptoStore:
          path: /tmp/hfc-cvs/distributor
      clientPrivateKey:
        path: ../artifacts/channel/crypto-config/peerOrganizations/distributor.example.com/users/Admin@distributor.example.com/msp/keystore/priv_sk
      clientSignedCert:
        path: ../artifacts/channel/crypto-config/peerOrganizations/distributor.example.com/users/Admin@distributor.example.com/msp/signcerts/Admin@distributor.example.com-cert.pem

  clientPharmacy:
    client:
      organization: PharmacyOrg3
      credentialStore:
        path: /tmp/hfc-kvs/pharmacy
        cryptoStore:
          path: /tmp/hfc-cvs/pharmacy
      clientPrivateKey:
        path: ../artifacts/channel/crypto-config/peerOrganizations/pharmacy.example.com/users/Admin@pharmacy.example.com/msp/keystore/priv_sk
      clientSignedCert:
        path: ../artifacts/channel/crypto-config/peerOrganizations/pharmacy.example.com/users/Admin@pharmacy.example.com/msp/signcerts/Admin@pharmacy.example.com-cert.pem
channels:
  mychannel:
    created: false
    definition:
     version: 0
     consortium: SampleConsortium
     capabilities:
       - V2_0
     msps:
       - ShippingOrg1MSP
       - DistributorOrg2MSP
       - PharmacyOrg3MSP
    contracts:
      - id: pharmachain
        version: "6"
    orderers:
      - orderer.example.com
    peers:
      peer0.shipping.example.com:
        endorsingPeer: true
        chaincodeQuery: true
        ledgerQuery: true
        eventSource: true
      peer0.distributor.example.com:
        endorsingPeer: true
        chaincodeQuery: true
        ledgerQuery: true
        eventSource: true
      peer0.pharmacy.example.com:
        endorsingPeer: true
        chaincodeQuery: true
        ledgerQuery: true
        eventSource: true
organizations:
  ShippingOrg1:
    mspid: ShippingOrg1MSP
    peers:
      - peer0.shipping.example.com
  DistributorOrg2:
    mspid: DistributorOrg2MSP
    peers:
      - peer0.distributor.example.com
  PharmacyOrg3:
    mspid: PharmacyOrg3MSP
    peers:
      - peer0.pharmacy.example.com

orderers:
  orderer.example.com:
    url: grpcs://localhost:7050
    grpcOptions:
      ssl-target-name-override: orderer.example.com
    tlsCACerts:
      path: ../artifacts/channel/crypto-config/ordererOrganizations/example.com/orderers/orderer.example.com/tls/ca.crt

peers:
  peer0.shipping.example.com:
    url: grpcs://localhost:7051
    grpcOptions:
      ssl-target-name-override: peer0.shipping.example.com
    tlsCACerts:
      path: ../artifacts/channel/crypto-config/peerOrganizations/shipping.example.com/peers/peer0.shipping.example.com/tls/ca.crt
  peer0.distributor.example.com:
    url: grpcs://localhost:9051
    grpcOptions:
      ssl-target-name-override: peer0.distributor.example.com
    tlsCACerts:
      path: ../artifacts/channel/crypto-config/peerOrganizations/distributor.example.com/peers/peer0.distributor.example.com/tls/ca.crt
  peer0.pharmacy.example.com:
    url: grpcs://localhost:11051
    grpcOptions:
      ssl-target-name-override: peer0.pharmacy.example.com
    tlsCACerts:
      path: ../artifacts/channel/crypto-config/peerOrganizations/pharmacy.example.com/peers/peer0.pharmacy.example.com/tls/ca.crt
